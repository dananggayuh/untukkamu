<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Selamat Bertambah Usia</title>

<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

<style>
body{
  margin:0;
  background: linear-gradient(135deg, #fbc2eb, #a6c1ee);
  font-family: system-ui, sans-serif;
  overflow:hidden;
}

*{ box-sizing:border-box; }

.glass{
  background: rgba(255,255,255,0.25);
  backdrop-filter: blur(18px);
  border:1px solid rgba(255,255,255,0.4);
  width: 90%;
  max-width: 360px;
  margin:auto;
  border-radius:20px;
  padding:18px;
  text-align:center;
}

/* BUTTON */
button{
  transition:.2s;
  font-size:14px;
  padding:10px;
}
button:hover{transform:scale(1.05);}
button:active{transform:scale(.95);}

/* LOCK */
.unlock{animation:slideUp .8s forwards;}
@keyframes slideUp{
  to{transform:translateY(-100vh);opacity:0;}
}

/* BALON */
.balon{
  position:absolute;
  font-size:22px;
  animation: floatUp 5s linear forwards, sway 2s ease-in-out infinite alternate;
}
@keyframes floatUp{
  0%{transform:translateY(0);}
  100%{transform:translateY(-500px);opacity:0;}
}
@keyframes sway{
  0%{transform:translateX(-6px);}
  100%{transform:translateX(6px);}
}

/* OVERLAY */
.overlay{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  background:rgba(0,0,0,.65);
  text-align:center;
  padding:20px;
}

/* FOTO */
.photo{
  width:140px;
  height:140px;
  object-fit:cover;
  border-radius:50%;
  border:4px solid white;
  margin-bottom:10px;
}

/* 💖 NAMA (FIX UTAMA DI SINI) */
.nama-utama{
  font-size: 36px;
  font-weight: 900;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: #ff2e93;
  margin: 10px 0;

  text-shadow:
    0 0 12px rgba(255,46,147,0.8),
    0 0 28px rgba(255,46,147,0.6),
    0 0 50px rgba(255,46,147,0.3);

  animation: namePulse 2.5s ease-in-out infinite;
}

@keyframes namePulse{
  0%,100%{
    transform:scale(1);
  }
  50%{
    transform:scale(1.12);
  }
}

/* TEXT */
.line{
  font-size:14px;
  line-height:1.6;
  color:#333;
}
</style>
</head>

<body class="flex items-center justify-center h-screen">

<audio id="lagu" src="dctunggaleka.mp3" loop></audio>

<!-- 🔐 LOCK -->
<div id="lock" class="glass">
<h2>🔐 PIN</h2>
<p style="font-size:12px;">tanggal istimewa ❤️</p>
<div id="display">••••••</div>

<div class="grid grid-cols-3 gap-2 mt-3">
<button onclick="inputPin('1')">1</button>
<button onclick="inputPin('2')">2</button>
<button onclick="inputPin('3')">3</button>
<button onclick="inputPin('4')">4</button>
<button onclick="inputPin('5')">5</button>
<button onclick="inputPin('6')">6</button>
<button onclick="inputPin('7')">7</button>
<button onclick="inputPin('8')">8</button>
<button onclick="inputPin('9')">9</button>
<button onclick="hapus()">⌫</button>
<button onclick="inputPin('0')">0</button>
<button onclick="cekPin()">✔</button>
</div>
</div>

<!-- 🎂 CARD -->
<div id="kartu" style="display:none;" class="glass">

<h2>Selamat Bertambah Usia 🌷</h2>

<!-- 💖 NAMA DI-FOKUSKAN DI SINI -->
<h1 class="nama-utama">
SULIS WANTI SHELVIA
</h1>

<button onclick="nextStep()" class="mt-3 bg-pink-400 text-white w-full rounded">
Pencet sini!
</button>

</div>

<script src="https://cdn.jsdelivr.net/npm/@hiseb/confetti@2.1.0/dist/confetti.min.js"></script>

<script>
let pin="", benar="060502";
let step=0;
let tap=0;

let lock=document.getElementById("lock");
let kartu=document.getElementById("kartu");

function inputPin(x){
 if(pin.length<6){pin+=x;update();}
}

function hapus(){
 pin=pin.slice(0,-1);
 update();
}

function update(){
 document.getElementById("display").innerText="•".repeat(pin.length);
}

function cekPin(){
 if(pin===benar){

  lock.classList.add("unlock");

  setTimeout(()=>{
    lock.style.display="none";
    kartu.style.display="block";

    let l=document.getElementById("lagu");
    l.volume=0;

    let playPromise = l.play();
    if(playPromise !== undefined){
      playPromise.then(()=>{
        let fade=setInterval(()=>{
          if(l.volume < 0.7){
            l.volume += 0.05;
          } else {
            clearInterval(fade);
          }
        },200);
      }).catch(()=>{});
    }

  },700);

 } else {
  pin="";
  update();
 }
}

/* FLOW */
function nextStep(){
 step++;

 if(step===1){
  kartu.innerHTML=`
  <p class="line">
  Selamat Ulang Tahun, calon Bini ❤︎<br><br>
  Semoga Allah melimpahkan keberkahan dan menjaga hatimu selalu dalam kebaikan.<br><br>
  nanti baca Q.S Maryam ayat 33 ya 🤍<br><br>
  Semoga Allah melancarkan semua hajat kita.
  </p>

  <button onclick="nextStep()" class="mt-3 bg-pink-400 text-white w-full rounded">
  Lanjut →
  </button>`;
 }

 else if(step===2){
  kartu.innerHTML=`
  <p>sedikit kejutan 🎈</p>
  <div id="balonArea"></div>`;

  spawnBalloon();
  setTimeout(()=>nextStep(),4000);
 }

 else{
  ending();
 }
}

/* BALON */
function spawnBalloon(){
 let area=document.getElementById("balonArea");

 let spawn=setInterval(()=>{
  if(tap>=10){clearInterval(spawn);return;}

  let b=document.createElement("div");
  b.className="balon";
  b.innerText="🎈";

  b.style.left=Math.random()*80+"%";
  b.style.bottom="0";

  area.appendChild(b);

  setTimeout(()=>b.remove(),5000);

  tap++;
 },700);
}

/* ENDING */
function ending(){
 let o=document.createElement("div");
 o.className="overlay";

 o.innerHTML=`
 <img src="aku.jpg" class="photo"
 onerror="this.src='https://i.imgur.com/8Km9tLL.png'">

 <h2 style="color:white;">🎉 Selamat 24 Tahun 🎉</h2>

 <p style="color:#ddd;font-size:14px;line-height:1.6;margin-top:10px;">
 Terima kasih sudah hadir di hidupku.<br>
 Semoga setiap langkahmu (langkah kita) selalu diberkahi,<br>
 dan semoga aku bisa selalu bisa mendukungmu 🤍
 </p>
 `;

 document.body.appendChild(o);

 confetti({particleCount:200,spread:120});
}
</script>

</body>
</html>
